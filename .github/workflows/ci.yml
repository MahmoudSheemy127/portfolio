name: CI

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    # OIDC permissions
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: eu-north-1

    steps:
      # 1. Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js & cache dependencies for speed
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Authenticate to AWS via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Build produces the 'out' folder
      - name: Build SPA
        run: npm run build

      # Sync 'out' instead of 'dist'
      - name: Sync static assets (long cache)
        run: |
          aws s3 sync out "s3://${{ secrets.FRONTEND_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.html"

      - name: Upload HTML files (no cache)
        run: |
          aws s3 cp out "s3://${{ secrets.FRONTEND_BUCKET }}" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache" \
            --content-type "text/html"

      # 8. Invalidate CloudFront edge cache (uncomment when CloudFront is active)
      # - name: Invalidate CloudFront
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
      #       --paths "/index.html" "/"