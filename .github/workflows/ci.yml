name: CI

on:
    push:
        branches: [main]


jobs:

    deploy-frontend:
        name: Deploy Frontend
        runs-on: ubuntu-latest

        # OIDC: assume the AWS deploy role without long-lived keys.
        permissions:
            id-token: write
            contents: read

        # The SPA is a pure static build — everything runs inside frontend/.
        defaults:
            run:
                working-directory: frontend

        env:
            AWS_REGION: eu-north-1

        steps:

            # VITE_* values are public and baked into the bundle at build time,
            # so they live in repo Variables (not Secrets). Changing the backend
            # URL means rebuilding.
            - name: Build
              run: npm run build

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            # Two-pass sync: Vite fingerprints everything under dist/assets, so
            # those hashed files get a 1-year immutable cache. index.html points
            # at the current hashes, so it must never be cached — uploaded
            # separately and invalidated on every deploy.
            - name: Sync static assets (long cache)
              run: |
                  aws s3 sync dist "s3://${{ secrets.FRONTEND_BUCKET }}" \
                    --delete \
                    --cache-control "public,max-age=31536000,immutable" \
                    --exclude "index.html"

            - name: Upload index.html (no cache)
              run: |
                  aws s3 cp dist/index.html "s3://${{ secrets.FRONTEND_BUCKET }}/index.html" \
                    --cache-control "no-cache" \
                    --content-type "text/html"

            # - name: Invalidate CloudFront
            #   run: |
            #       aws cloudfront create-invalidation \
            #         --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            #         --paths "/index.html" "/"