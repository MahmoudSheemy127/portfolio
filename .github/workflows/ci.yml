name: CI

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    # OIDC permissions
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: eu-north-1

    steps:
      # 1. Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js & cache dependencies for speed
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build Vite app (injecting environment variables)
      - name: Build SPA
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Add any other VITE_* variables declared in Repo Variables here

      # 5. Authenticate to AWS via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 6. Two-pass S3 sync: fingerprinted assets (1-year cache)
      - name: Sync static assets (long cache)
        run: |
          aws s3 sync dist "s3://${{ secrets.FRONTEND_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

      # 7. Upload entrypoint with no caching
      - name: Upload index.html (no cache)
        run: |
          aws s3 cp dist/index.html "s3://${{ secrets.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache" \
            --content-type "text/html"

      # 8. Invalidate CloudFront edge cache (uncomment when CloudFront is active)
      # - name: Invalidate CloudFront
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
      #       --paths "/index.html" "/"